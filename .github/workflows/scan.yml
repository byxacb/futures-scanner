name: 期货机会扫描

on:
  # 多种触发方式确保稳定运行
  schedule:
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 * * * *'  # 每5分钟
  push:
    branches: [main]  # 每次推送也触发
  workflow_dispatch:
  repository_dispatch:
    types: [scan]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare httpx numpy

      - name: 扫描期货机会
        env:
          BARK_URL: ${{ secrets.BARK_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
        run: python tools/research/cloud_scanner.py
