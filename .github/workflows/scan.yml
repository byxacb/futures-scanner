name: 期货机会扫描

# 每5分钟扫描一次（交易时间）
# 北京时间 UTC+8，GitHub Actions 用 UTC

on:
  schedule:
    # 每5分钟运行（周一到周五）
    - cron: '*/5 * * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install akshare httpx numpy

      - name: 扫描期货机会
        env:
          BARK_URL: ${{ secrets.BARK_URL }}
        run: python tools/research/cloud_scanner.py
